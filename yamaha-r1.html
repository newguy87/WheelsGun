<!doctype html>
<html lang="en">
  <head>
    <title>Yamaha R1</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <a href="home.html" class="logo">
      <img src="images-moto/logo.png" alt="Back to home" />
    </a>

    <div class="content">
      <h1>Yamaha YZF R1</h1>
      <img src="images-moto/yamaha-r1.jpg" alt="Yamaha YZF R1" width="400" />

      <p>
        The Yamaha R1 is a high performance sport motorcycle made by Yamaha. It
        has a 998cc engine and is known for its racing technology.
      </p>

      <ul>
        <li>Engine: 998cc</li>
        <li>Top Speed: 299km/h</li>
        <li>Type: Superbike</li>
      </ul>
    </div>
    <p>Here are some more photos:</p>

    <div class="gallery">
      <img
        src="images-moto/r1/photo1.jpg"
        alt="Bike 1"
        class="gallery-r1-img"
      />
      <img
        src="images-moto/r1/photo2.jpg"
        alt="Bike 2"
        class="gallery-r1-img"
      />
      <img
        src="images-moto/r1/photo3.jpg"
        alt="Bike 3"
        class="gallery-r1-img"
      />
      <img
        src="images-moto/r1/photo4.jpg"
        alt="Bike 4"
        class="gallery-r1-img"
      />
      <img
        src="images-moto/r1/photo5.jpg"
        alt="Bike 5"
        class="gallery-r1-img"
      />
      <img
        src="images-moto/r1/photo6.jpg"
        alt="Bike 6"
        class="gallery-r1-img"
      />
    </div>

    <div id="lightbox">
      <span id="close">&times;</span>
      <img id="lightbox-img" src="" alt="close up" />
    </div>
    <script>
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const closeBtn = document.getElementById("close");
      const galleryImages = document.querySelectorAll(".gallery-r1-img");

      galleryImages.forEach((img) => {
        img.addEventListener("click", () => {
          lightbox.style.display = "flex"; // show lightbox
          lightboxImg.src = img.src; // set the clicked image
        });
      });

      closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none"; // hide lightbox
      });
    </script>
  </body>
</html>
